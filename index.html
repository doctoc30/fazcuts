<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ CUTS | London's Premier Barber</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Faz Cuts">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>window.OneSignalDeferred = window.OneSignalDeferred || [];</script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #D4AF37;
            --primary-light: #1A1A1A;
            --bg: #000000;
            --text: #FFFFFF;
            --card-bg: rgba(26,26,26,0.9);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --gray: #999;
            --border: rgba(212,175,55,0.2);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Inter',sans-serif;}
        body,html{height:100%;background-color:var(--bg);color:var(--text);overflow-x:hidden;overflow-y:auto;overscroll-behavior:none;-webkit-overflow-scrolling:touch;}

        /* LOADER */
        #app-loader{position:fixed;inset:0;background:#000;z-index:10000;display:flex;align-items:center;justify-content:center;transition:transform 0.8s cubic-bezier(0.9,0,0.1,1);}
       .loader-content{display:flex;flex-direction:column;align-items:center;text-align:center;line-height:1;}
       .loader-content span{color:#FFFFFF;}
       .layer-1{font-size:7rem;font-weight:900;color:var(--primary);letter-spacing:-5px;animation:slideFromRight 0.8s cubic-bezier(0.16,1,0.3,1) forwards;}
       .layer-2{font-size:2.5rem;font-weight:900;color:#FFF;letter-spacing:-1.5px;margin-top:5px;opacity:0;animation:slideFromLeft 0.8s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;}
       .layer-3{font-size:2.5rem;font-weight:900;color:var(--primary);letter-spacing:-1.5px;opacity:0;animation:slideFromTop 0.8s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;}
        @keyframes slideFromRight{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes slideFromLeft{from{transform:translateX(-100px);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes slideFromTop{from{transform:translateY(-50px);opacity:0}to{transform:translateY(0);opacity:1}}

        /* MENU LAYER */
        #app-menu-layer{position:fixed;inset:0;background:var(--bg);z-index:25000;display:flex;flex-direction:column;padding:calc(var(--safe-top) + 20px) 25px;transform:translateY(100%);transition:transform 0.6s cubic-bezier(0.32,0.72,0,1);overscroll-behavior:none;}
        #app-menu-layer.active{transform:translateY(0);}
       .menu-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
       .menu-links{display:flex;flex-direction:column;gap:20px;flex:1;justify-content:center;align-items:center;text-align:center;}
       .menu-item{font-size:4.5rem;font-weight:900;color:var(--text);text-decoration:none;letter-spacing:-3px;line-height:1;opacity:0;transform:translateY(30px);transition:0.5s cubic-bezier(0.32,0.72,0,1);}
        #app-menu-layer.active.menu-item{opacity:1;transform:translateY(0);}
       .menu-item:nth-child(1){transition-delay:0.1s;}.menu-item:nth-child(2){transition-delay:0.2s;}.menu-item:nth-child(3){transition-delay:0.3s;}.menu-item:nth-child(4){transition-delay:0.4s;}
       .menu-footer{margin-top:auto;padding-bottom:calc(var(--safe-bottom) + 20px);font-weight:800;font-size:0.8rem;letter-spacing:1px;color:#555;text-align:center;}

        /* APP SHELL */
        #app-container{min-height:100vh;display:flex;flex-direction:column;opacity:0;transition:opacity 0.5s ease-in;position:relative;overscroll-behavior:none;}
        header{padding:calc(var(--safe-top) + 30px) 25px 20px;display:flex;justify-content:space-between;align-items:center;background:transparent;width:100%;position:absolute;top:0;left:0;z-index:800;}
       .header-spacer{height:130px;width:100%;}
       .app-logo{font-size:2.2rem;font-weight:900;letter-spacing:-1.5px;color:var(--primary);}
       .app-logo span{color:#FFFFFF;}
       .content-scroll{flex:1;padding:0 25px 100px;overscroll-behavior:contain;}
       .hero-area{text-align:center;padding:80px 0 50px;}
       .hero-area h1{font-size:3.2rem;font-weight:900;line-height:0.9;letter-spacing:-3px;margin-bottom:20px;color:var(--primary);max-width:800px;margin-left:auto;margin-right:auto;}
       .typewriter-container{font-size:3.2rem;font-weight:900;color:#FFFFFF;line-height:0.9;letter-spacing:-3px;margin-bottom:50px;text-transform:capitalize;min-height:4.2rem;white-space:nowrap;display:inline-block;width:100%;text-align:center;overflow-x:visible;}
        
        /* NOTIFICATION BUTTON */
        #notify-btn {
            background: var(--primary);
            color: #000;
            padding: 16px 32px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            margin: 20px auto 40px;
            cursor: pointer;
            display: none;
            width: 100%;
            max-width: 500px;
        }
       .subscribed-msg {
            color: #4CAF50;
            font-size: 14px;
            margin: 20px 0 40px;
            display: none;
            text-align: center;
        }
        
       .btn {
            display: block;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            padding: 16px;
            margin: 12px auto;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 16px;
            font-weight: 700;
            max-width: 500px;
        }

        /* DOCK */
       .app-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(20px);
            height: 70px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
            border-top: 1px solid rgba(212,175,55,0.15);
            width: 100%;
        }
       .dock-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            text-decoration: none;
            gap: 4px;
            cursor: pointer;
            background: none;
            border: none;
            flex: 1;
            padding: 8px 0;
        }
       .dock-btn.active{color:var(--primary);}
       .dock-btn i{font-size:1.4rem;}
       .dock-btn span{font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;}
       .dock-center {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.6rem;
            margin-top: -32px;
            border: 4px solid #000;
            box-shadow: 0 8px 20px rgba(212,175,55,0.35);
            cursor: pointer;
            transition: transform 0.2s;
        }
    </style>
</head>
<body>

<!-- LOADER -->
<div id="app-loader"><div class="loader-content"><div class="layer-1">FAZ<span>.</span></div><div class="layer-2">London's Premier</div><div class="layer-3">Barber Shop.</div></div></div>

<!-- MENU -->
<div id="app-menu-layer"><div class="menu-header"><div class="app-logo">FAZ<span>.</span></div><div class="close-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div></div><div class="menu-links"><a href="#" class="menu-item" onclick="toggleMenu()">Home</a><a href="#" class="menu-item">Services</a><a href="#" class="menu-item">Gallery</a><a href="#" class="menu-item">Contact</a></div><div class="menu-footer">FAZ CUTS © 2026</div></div>

<!-- MAIN APP -->
<div id="app-container">
    <header id="main-header"><div class="app-logo">FAZ<span>.</span></div></header>
    <div class="header-spacer"></div>
    <main class="content-scroll">
        <div class="hero-area">
            <h1>FAZ CUTS</h1>
            <div class="typewriter-container"><span id="typewriter"></span></div>
            
            <button id="notify-btn">Enable Notifications 🔔</button>
            <div id="subscribed-msg" class="subscribed-msg">✅ Notifications Enabled</div>
            
            <a href="https://booksy.com/your-link" class="btn">Book Appointment</a>
            <a href="tel:+447000000000" class="btn">Call Faz</a>
            <a href="https://maps.google.com/?q=Faz+Cuts+London" class="btn">Get Directions</a>
        </div>
    </main>

    <nav class="app-dock">
        <a href="#" class="dock-btn active"><i class="fa-solid fa-house-chimney"></i><span>HOME</span></a>
        <div class="dock-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i><span>MENU</span></div>
        <div class="dock-center" onclick="document.getElementById('notify-btn').click()"><i class="fa-solid fa-bell"></i></div>
        <a href="https://booksy.com/your-link" class="dock-btn"><i class="fa-solid fa-calendar"></i><span>BOOK</span></a>
        <a href="tel:+447000000000" class="dock-btn"><i class="fa-solid fa-phone"></i><span>CALL</span></a>
    </nav>
</div>

<script>
    // TYPEWRITER
    const typewriterWords = ["Fresh Fades", "Sharp Lines", "Clean Cuts", "Beard Trims", "Hot Towels"];
    let typeIdx = 0, typeChar = 0, typeDeleting = false, typeWait = false;
    const typeEl = document.getElementById('typewriter');
    setInterval(() => {
        if (!typeEl || typeWait) return;
        const currentText = typewriterWords[typeIdx];
        if (!typeDeleting) {
            typeEl.textContent = currentText.substring(0, typeChar + 1);
            typeChar++;
            if (typeChar === currentText.length) { typeWait = true; setTimeout(()=>{ typeDeleting=true; typeWait=false; },1800); }
        } else {
            typeEl.textContent = currentText.substring(0, typeChar - 1);
            typeChar--;
            if (typeChar === 0) { typeDeleting=false; typeIdx=(typeIdx+1)%typewriterWords.length; typeWait=true; setTimeout(()=>{ typeWait=false; },300); }
        }
    }, 80);

    function toggleMenu(){ document.getElementById('app-menu-layer').classList.toggle('active'); }

    // ONESIGNAL
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "9f4daf55-8ade-4e9f-b64e-876a64ad294f",
        serviceWorkerPath: "/OneSignalSDKWorker.js",
        serviceWorkerParam: { scope: "/" },
        allowLocalhostAsSecureOrigin: true
      });

      const btn = document.getElementById('notify-btn');
      const msg = document.getElementById('subscribed-msg');
      
      async function updateSubscriptionUI() {
        const isSubscribed = await OneSignal.User.PushSubscription.optedIn;
        if (isSubscribed) {
          btn.style.display = 'none';
          msg.style.display = 'block';
        } else {
          btn.style.display = 'block';
          msg.style.display = 'none';
        }
      }
      
      await updateSubscriptionUI();
      
      btn.onclick = async () => {
        await OneSignal.Slidedown.promptPush();
        setTimeout(async () => {
          await updateSubscriptionUI();
          const isNowSubscribed = await OneSignal.User.PushSubscription.optedIn;
          if (isNowSubscribed) {
            alert('Subscribed! You\'ll get last-minute slot alerts 🔔');
          }
        }, 2000);
      };
      
      OneSignal.User.PushSubscription.addEventListener('change', updateSubscriptionUI);
    });

    window.addEventListener("load",function(){ 
        setTimeout(()=>{ 
            document.getElementById('app-loader').style.transform='translateY(-100%)'; 
            document.getElementById('app-container').style.opacity='1'; 
        },1800); 
    });
</script>
</body>
</html>
