<!DOCTYPE html>
<html>
<head>
  <title>Faz Cuts - Send Alerts</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    *{box-sizing:border-box}body{font-family:-apple-system,sans-serif;padding:16px;background:#f2f2f7;margin:0}
  .card{background:#fff;padding:20px;border-radius:16px;max-width:420px;margin:0 auto}
    h1{font-size:22px;margin:0 0 4px}.sub{color:#666;font-size:14px;margin:0 0 20px}
    textarea{width:100%;height:90px;padding:12px;font-size:16px;border:1px solid #ddd;border-radius:10px}
    button{width:100%;padding:16px;margin-top:12px;font-size:17px;font-weight:600;border:none;border-radius:10px;cursor:pointer}
  .send{background:#007AFF;color:#fff}.template{background:#EFEFF4;color:#000;margin-top:8px;font-size:15px;padding:12px}
  .status{margin-top:16px;font-weight:600;text-align:center;min-height:20px}.success{color:#34C759}.error{color:#FF3B30}
  .row{display:flex;gap:8px;margin-top:8px}.row button{margin-top:0}
  </style>
</head>
<body>
  <div class="card">
    <h1 id="businessName">FAZ CUTS ALERTS</h1>
    <p class="sub">Type message → Send to all customers</p>
    <textarea id="msg" placeholder="Example: 4pm slot just opened today"></textarea>
    <button class="send" onclick="sendPush()">Send to All Customers</button>
    <div class="row">
      <button class="template" onclick="quickSend('Slot available today. Reply YES to book')">Slot Open</button>
      <button class="template" onclick="quickSend('Your haircut is ready for collection')">Job Done</button>
    </div>
    <button class="template" onclick="quickSend('20% off all cuts today only')">20% Off Today</button>
    <div id="status" class="status"></div>
  </div>
<script>
const BUSINESS_URL = "https://fazcuts.vibzapps.co.uk";
const params = new URLSearchParams(window.location.search);
const name = params.get('name');
if(name) document.getElementById('businessName').innerText = name.toUpperCase() + ' ALERTS';
function quickSend(text){document.getElementById('msg').value = text;sendPush();}
async function sendPush(){
  const message = document.getElementById('msg').value.trim();
  const status = document.getElementById('status');
  if(!message){status.className='status error';status.innerText="Type a message first";return;}
  status.className='status';status.innerText="Sending...";
  try{
    const response = await fetch('send.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:message,url:BUSINESS_URL})});
    const data = await response.json();
    if(data.id&&data.recipients>0){status.className='status success';status.innerText=`✅ Sent to ${data.recipients} phones`;document.getElementById('msg').value="";}
    else if(data.recipients===0){status.className='status error';status.innerText="❌ No customers subscribed yet";}
    else{status.className='status error';status.innerText="❌ Error sending";}
  }catch(err){status.className='status error';status.innerText="❌ Failed. Check connection.";}
}
</script>
</body>
</html>
